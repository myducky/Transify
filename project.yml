name: Transify
options:
  bundleIdPrefix: com.transify
  deploymentTarget:
    macOS: "13.0"
settings:
  SWIFT_VERSION: "5.9"
targets:
  Transify:
    type: application
    platform: macOS
    sources: [Transify]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.transify.Transify
      INFOPLIST_FILE: Transify/Info.plist
      CODE_SIGN_ENTITLEMENTS: Transify/Transify.entitlements
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGNING_REQUIRED: "YES"
  TransifyTests:
    type: bundle.unit-test
    platform: macOS
    sources: [TransifyTests]
    dependencies:
      - target: Transify
